<!DOCTYPE html>
<html>
<head>

<title>NotifyEngine</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#6a5af9,#9b59ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
}

.card-box{
width:400px;
padding:40px;
border-radius:15px;
background:white;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.btn-main{
background:linear-gradient(90deg,#6a5af9,#9b59ff);
border:none;
color:white;
}

.toggle{
cursor:pointer;
color:#6a5af9;
}

</style>

</head>

<body>

<div class="card-box">

<h3 class="text-center mb-4" id="formTitle">Login</h3>

<!-- LOGIN FORM -->

<form id="loginForm">

<div class="mb-3">
<label>Email</label>
<input type="email" id="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" id="password" class="form-control" required>
</div>

<button onclick="loginUser()" class="btn btn-primary w-100">
Login
</button>

<p class="text-center mt-3">
Don't have an account? 
<span class="toggle" onclick="showSignup()">Sign Up</span>
</p>

</form>


<!-- SIGNUP FORM -->

<form id="signupForm" style="display:none">

<div class="mb-3">
<label>Name</label>
<input type="text" id="name" class="form-control">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" id="signupEmail" class="form-control">
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" id="signupPassword" class="form-control">
</div>

<button type="button" onclick="signupUser()" class="btn btn-main w-100">
Create Account
</button>

<p class="text-center mt-3">
Already have an account? 
<span class="toggle" onclick="showLogin()">Login</span>
</p>

</form>

</div>

<script src="script.js"></script>

</body>
</html>

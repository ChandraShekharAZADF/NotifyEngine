<!DOCTYPE html>
<html>
<head>

<title>Create Reminder</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(-45deg,#667eea,#764ba2,#6a5af9,#9b59ff);
background-size:400% 400%;
animation:gradient 10s ease infinite;
}

@keyframes gradient{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* Card */

.reminder-card{
width:420px;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Inputs */

.form-control{
border-radius:8px;
transition:0.3s;
}

.form-control:focus{
box-shadow:0 0 10px rgba(106,90,249,0.5);
}

/* Button */

.btn-main{
background:linear-gradient(90deg,#6a5af9,#9b59ff);
color:white;
border:none;
padding:10px;
font-weight:600;
transition:0.3s;
}

.btn-main:hover{
transform:scale(1.05);
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* Success message */

.success{
display:none;
text-align:center;
color:green;
margin-top:15px;
font-weight:600;
}

</style>

</head>

<body>

<div class="reminder-card">

<h3 class="text-center mb-4">
<i class="fa-solid fa-bell"></i> Create Reminder
</h3>

<div class="mb-3">
<label>Title</label>
<input type="text" id="title" class="form-control">
</div>

<div class="mb-3">
<label>Description</label>
<textarea id="description" class="form-control"></textarea>
</div>

<div class="mb-3">
<label>Date</label>
<input type="date" id="date" class="form-control">
</div>

<div class="mb-3">
<label>Time</label>
<input type="time" id="time" class="form-control">
</div>

<button onclick="createReminder()" class="btn btn-main w-100">
Create Reminder
</button>

<div id="successMessage" class="success">
✔ Reminder Created Successfully
</div>

</div>

<script src="script.js"></script>

<script>

function showSuccess(){

const msg=document.getElementById("successMessage")

msg.style.display="block"

setTimeout(()=>{
msg.style.display="none"
},3000)

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f4f5ff;
font-family:Arial;
}

.container-box{
padding:40px;
}

.card-box{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="container-box">

<h2>Admin Dashboard</h2>

<div class="row mt-4">

<div class="col-md-4">
<div class="card-box">
<h4>Total Users</h4>
<h2 id="userCount">0</h2>
</div>
</div>

<div class="col-md-4">
<div class="card-box">
<h4>Total Reminders</h4>
<h2 id="reminderCount">0</h2>
</div>
</div>

</div>

<div class="mt-5">

<canvas id="reminderChart"></canvas>

</div>

</div>

<script src="script.js"></script>

<script>
loadAdminStats()
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<title>NotifyEngine Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css">

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
overflow-x:hidden;
}

/* Sidebar */

.sidebar{
width:250px;
height:100vh;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
position:fixed;
padding:25px;
color:white;
transition:0.3s;
}

.sidebar h3{
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px;
border-radius:8px;
margin-bottom:10px;
text-decoration:none;
transition:0.3s;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2);
transform:translateX(5px);
}

/* Main */

.main{
margin-left:260px;
padding:40px;
}

/* Glass Cards */

.stat-card{
padding:25px;
border-radius:15px;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
color:white;
text-align:center;
transition:0.3s;
}

.stat-card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

/* Reminder Cards */

.reminder-card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
margin-bottom:15px;
transition:0.3s;
}

.reminder-card:hover{
transform:translateY(-5px);
}

/* Buttons */

.btn{
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* Fade Animation */

.fade-in{
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h3>NotifyEngine</h3>

<a href="dashboard.html">📊 Dashboard</a>
<a href="reminder.html">⏰ Reminders</a>
<a href="#">🔔 Notifications</a>
<a href="admin.html">⚙ Admin</a>

</div>

<!-- Main Content -->

<div class="main">

<div style="
background:linear-gradient(135deg,#ff7e5f,#feb47b);
padding:25px;
border-radius:15px;
color:white;
margin-bottom:30px;
display:flex;
justify-content:space-between;
align-items:center;
">

<div>
<h2 id="greeting">Welcome Back 👋</h2>
<p id="clock"></p>
</div>

<div style="display:flex;gap:15px;align-items:center">

<div style="position:relative;margin-left:20px">

<i class="fa-solid fa-bell" style="font-size:20px;cursor:pointer"
onclick="toggleNotifications()"></i>

<span id="notificationBadge" style="
position:absolute;
top:-5px;
right:-8px;
background:red;
color:white;
font-size:12px;
padding:3px 6px;
border-radius:50%;
">0</span>

<div id="notificationBox" style="
display:none;
position:absolute;
right:0;
top:30px;
width:250px;
background:white;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
padding:15px;
">

<h6>Notifications</h6>

<div id="notificationList"></div>

</div>

</div>

<button onclick="toggleTheme()" class="btn btn-dark btn-sm">
🌙 Dark Mode
</button>

</div>

</div>

<div class="row mt-4">

<div class="col-md-4">
<div class="stat-card card1 text-center">
<h4>Total Reminders</h4>
<h2 class="total-reminders">0</h2>
</div>
</div>

<div class="col-md-4">
<div class="stat-card card2 text-center">
<h4>Notifications</h4>
<h2 id="notificationCountCard">0</h2>
</div>
</div>

<div class="col-md-4">
<div class="stat-card card3 text-center">
<h4>Active Tasks</h4>
<h2 id="activeTasks">0</h2>
</div>
</div>

</div>

<div class="row mt-5">

<div class="col-md-6">
<canvas id="reminderChart"></canvas>
</div>

<div class="col-md-6">
<canvas id="statusChart"></canvas>
</div>

</div>

<div class="reminder-card mt-5">

<h4>Reminder Calendar</h4>

<div id="calendar"></div>

</div>

<!-- Search -->

<input 
type="text"
id="searchReminder"
class="form-control mt-4"
placeholder="Search reminders..."
onkeyup="searchReminders()"
>

<!-- Reminder List -->

<div class="mt-4" id="reminderList"></div>

</div>

<script src="script.js"></script>

<script>
window.onload=function(){
loadReminders()
loadNotifications()
}
</script>

<a href="reminder.html" style="
position:fixed;
bottom:30px;
right:30px;
background:#ff7e5f;
color:white;
padding:18px;
border-radius:50%;
font-size:22px;
text-decoration:none;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
">

➕

</a>
<h4 class="mt-5">Activity Timeline</h4>

<div class="timeline">

<div class="timeline-item">
🔔 Reminder Created
<small>2 minutes ago</small>
</div>

<div class="timeline-item">
✅ Task Completed
<small>10 minutes ago</small>
</div>

</div>

</body>
</html>
